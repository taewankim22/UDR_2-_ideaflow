services:
  postgres:
    image: postgres:16-alpine
    container_name: ideaflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ideaflow
      POSTGRES_PASSWORD: ideaflow
      POSTGRES_DB: ideaflow
    ports:
      - "5432:5432"
    volumes:
      - ideaflow-postgres:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ideaflow-api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://ideaflow:ideaflow@postgres:5432/ideaflow?schema=public"
      JWT_SECRET: "dev-local-ideaflow-secret-change-before-production"
      PORT: "4000"
      FRONTEND_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      AI_MODE: "mock"
      GEMINI_API_KEY: ""
    ports:
      - "4000:4000"
    depends_on:
      - postgres

volumes:
  ideaflow-postgres:
